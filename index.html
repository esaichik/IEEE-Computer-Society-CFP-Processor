<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.js"></script>
</head>

<body>
<table id="csvTable" class="display" style="width:100%">
    <thead>
    <tr>
        <th>Type</th>
        <th>Name</th>
        <th>Title</th>
        <th>Summary</th>
        <th>Due Date</th>
        <th>Link</th>
    </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
</table>

<script>
    jQuery.fn.dataTable.ext.type.order['date-with-null-asc'] = function(a, b) {
        var x = (a === 'Not specified' || !a) ? 1 : 0;
        var y = (b === 'Not specified' || !b) ? 1 : 0;
        if (x !== y) return x - y;
        return a.localeCompare(b);
    };

    jQuery.fn.dataTable.ext.type.order['date-with-null-desc'] = function(a, b) {
        var x = (a === 'Not specified' || !a) ? 1 : 0;
        var y = (b === 'Not specified' || !b) ? 1 : 0;
        if (x !== y) return x - y;
        return b.localeCompare(a);
    };

    function parseAndPopulateCSV(csvData) {
        Papa.parse(csvData, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            transform: function(value, column) {
                switch (column) {
                    case "Deadline": return value ? value : 'Not specified';
                    case "TitleLink": return '<a href="' + value + '">' + value + '</a>'
                    default: return value;
                }
            },
            complete: function (results) {
                const data = results.data;
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '';

                data.forEach(function (row) {
                    let rowHtml = '<tr>';
                    rowHtml += '<td>' + row.Type + '</td>';
                    rowHtml += '<td>' + row.Name + '</td>';
                    rowHtml += '<td>' + row.Title + '</td>';
                    rowHtml += '<td>' + row.Summary + '</td>';
                    rowHtml += '<td>' + row.Deadline + '</td>';
                    rowHtml += '<td>' + row.TitleLink + '</td>';
                    rowHtml += '</tr>';
                    tableBody.innerHTML += rowHtml;
                });

                // Initialize DataTable
                $('#csvTable').DataTable({
                    columnDefs: [
                        {
                            targets: 4, // Due Date column
                            type: 'date-with-null',
                            render: function(data, type, row) {
                                if (type === 'display' && data && data !== 'Not specified') {
                                    const parts = data.split('-');
                                    if (parts.length === 3) {
                                        const months = ['January', 'February', 'March', 'April', 'May', 'June',
                                            'July', 'August', 'September', 'October', 'November', 'December'];
                                        const year = parts[0];
                                        const month = months[parseInt(parts[1], 10) - 1];
                                        const day = parseInt(parts[2], 10);
                                        return day + ' ' + month + ' ' + year;
                                    }
                                }
                                return data;
                            }
                        }
                    ],
                    order: [[4, 'asc']]
                });
            }
        });
    }

</script>

<input type="file" id="csvFileInput" accept=".db">
<button onclick="loadCSVFile()">Load "cfp.db"</button>

<script>
    function loadCSVFile() {
        const input = document.getElementById('csvFileInput');
        const file = input.files[0];
        parseAndPopulateCSV(file)
    }
</script>
</body>

</html>
